<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styleatualizar.css">
    <title>Atualizar Seus Dados</title>
</head>
<body>

<div class="logo">
    <img src="logodaminhapi.png" alt="Java Logo" width="200">
</div>

    <div class="form-container">

   <h3>Atualizar Seus Dados</h3>
   <form action="" method="POST" id="update-form">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>
        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf" required>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <label for="rua">Rua:</label>
        <input type="text" id="rua" name="rua" required>
        <label for="bairro">Bairro:</label>
        <input type="text" id="bairro" name="bairro" required>
        <label for="cidade">Cidade:</label> 
        <input type="text" id="cidade" name="cidade" required>
        <label for="estado">Estado:</label> 
        <input type="text" id="estado" name="estado" required>
        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" required>
        <button onclick="return confirm('Tem certeza que deseja atualizar seus dados?');" type="submit">Atualizar</button>
   </form>
    </div>
    <script>
        let usuarioIdLogado = null; // Variável para armazenar o ID do usuário logado
  document.addEventListener('DOMContentLoaded', function() {
    const emailLogado = localStorage.getItem('emailUsuario') || localStorage.getItem('cpfUsuario');

    fetch('http://localhost:8083/usuarios/ ')
    .then(response => response.json())
    .then(data => {
 
  const usuarioLogado = data.find(usuario => usuario.email === emailLogado || usuario.cpf === emailLogado);

  if (usuarioLogado) {
    usuarioIdLogado = usuarioLogado.usuarioId || usuarioLogado.id; // Armazena o ID do usuário logado
    console.log('ID do usuário logado:', usuarioIdLogado); // Adicione este log para verificar o ID do usuário

    document.getElementById('nome').value = usuarioLogado.nome;
    document.getElementById('cpf').value = usuarioLogado.cpf;
    document.getElementById('email').value = usuarioLogado.email;
    document.getElementById('rua').value = usuarioLogado.Rua;
    document.getElementById('bairro').value = usuarioLogado.bairro;
    document.getElementById('cidade').value = usuarioLogado.cidade;
    document.getElementById('estado').value = usuarioLogado.Estado;
    document.getElementById('senha').value = " "; // Não preenche a senha por motivos de segurança
  }else{
    alert('Usuário não encontrado. Por favor, faça login novamente.');
    window.location.href = 'entrar.html'; // Redireciona para a página de login
  }
    })
    .catch(error => {
        console.error('Erro ao buscar os dados do usuário:', error);
        alert('Ocorreu um erro ao buscar os dados do usuário. Por favor, tente novamente.');
  

    });
})
    document.getElementById('update-form').addEventListener('submit', function(event) {
        event.preventDefault(); // Evita o envio padrão do formulário

        const usuarioId = usuarioIdLogado; // Use o ID do usuário logado
        const nome = document.getElementById('nome').value;
        const cpf = document.getElementById('cpf').value;
        const email = document.getElementById('email').value;
        const rua = document.getElementById('rua').value;
        const bairro = document.getElementById('bairro').value;
        const cidade = document.getElementById('cidade').value;
        const estado = document.getElementById('estado').value;
        const senha = document.getElementById('senha').value;

        const dadosAtualizados = {
            nome: nome,
            cpf: cpf,
            email: email,
            Rua: rua,
            bairro: bairro,
            cidade: cidade,
            Estado: estado,
            senha: senha
        };

        fetch(`http://localhost:8083/usuarios/${usuarioId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(dadosAtualizados)
        })
        .then(response => {
            if (response.ok) {
                alert('Dados atualizados com sucesso!');
                window.location.href = 'minhaconta.html'; // Redireciona para a página de conta após atualização
            } else {
                return response.text().then(text => { throw new Error(text) });
            }
        })
        .catch(error => {
            console.error('Erro ao atualizar os dados:', error);
            alert('Ocorreu um erro ao atualizar os dados. Por favor, tente novamente.');
        });
    });




    </script>
</body>
</html>
