<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styleentrar.css">
    <title>Entre com sua conta</title>
</head>
<body>
    
<div class="form">

<form id="login-form" >
    <h1>Login</h1>
    <input type="text" id="email" name="email" placeholder="Digite seu email" >
    <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
    <p>Não lembro a senha.... tente usando seu CPF:</p>
    <input type="text" id="cpf" name="cpf" placeholder="Digite seu CPF" >
    <button id="entrar-btn" type="submit">Entrar</button>
</form>



</div>

<script>
    // Adicione aqui qualquer código JavaScript necessário para validação ou manipulação do formulário
  const form = document.getElementById('login-form');
  form.addEventListener('submit', async(event) => {
   event.preventDefault(); // Evita o envio padrão do formulário

   const email = document.getElementById('email').value.trim();
   const senha = document.getElementById('senha').value.trim();
   const cpf = document.getElementById('cpf').value.trim();


   if(!email && !cpf) {
    alert('Por favor, preencha  o email ou Cpf para continuar.');
    return;
   }
   if(!senha) {
    alert('Por favor, preencha a senha para continuar.');
    return;
   }
   const identificador = email || cpf; // Usa email se estiver preenchido, caso contrário usa CPF

   const dadosLogin = {
    cpf: identificador,
    senha: senha
   };
    try{
        const response = await fetch('http://localhost:8083/usuarios/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(dadosLogin)
        });
        if(response.ok) {
            const usuario = await response.json();
            console.log('Login bem-sucedido:', usuario);
            // Redirecionar para a página de sucesso ou dashboard

         localStorage.setItem('usuarioLogado', 'true'); // Armazena os dados do usuário no localStorage
         localStorage.setItem('nomeUsuario', usuario.nome); // Armazena o nome do usuário no localStorage
         localStorage.setItem('emailUsuario', usuario.email); // Armazena o email do usuário no localStorage

            window.location.href = 'minhaconta.html'; // Redireciona para a página de listagem de usuários
        } else {
            const errorText = await response.text();
            console.error('Erro no login:', errorText);
            alert('Falha no login: ' + (errorText || 'Verifique suas credenciais.'));
        }
    }
  
    catch(error) {
        console.error('Erro na requisição:', error);
        alert('Ocorreu um erro ao tentar fazer login. Tente novamente mais tarde.');
    }
});




</script>
</body>
</html>
