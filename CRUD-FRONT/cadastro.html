<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API JAVA PROGRAMMING</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="logo">
    <img src="logodaminhapi.png" alt="Java Logo" width="200">
    <h1>Cadastro</h1>
</div>

     <div class="form">

    <form action = 'http://localhost:8083/usuarios/salvar' method = 'POST' id="form">
        <div class = inputs>
        <div classs="form-group1">
        <label for="user">Digite seu nome</label>
        <input type="text" id="user" name="nome" placeholder="Digite seu nome" required>
        
        <label for ="cpf">Digite seu CPF</label>
        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
        
        <label for="email">Digite seu email</label>
        <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com" required>
        </div>


        <div class="form-group">
        <h2>Endereço</h2>
        
        <label for="rua">Digite o nome da rua</label>
        <input type="text" id="rua" name="Rua" placeholder="Digite o nome da rua" required>

       

        <label for="bairro">Digite o nome do bairro</label>
        <input type="text" id="bairro" name="bairro" placeholder="Digite o nome do bairro" required>

        <label for="cidade">Digite o nome da cidade</label>
        <input type="text" id="cidade" name="cidade" placeholder="Digite o nome da cidade"   required>

        <label for="estado">Digite o nome do estado </label>
        <input type="text" id="estado" name="Estado" placeholder="Digite o nome do estado" required>
        
       <label for ="senha">Crie uma senha</label>
       <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>
    
    </div>
        </div>
        <button id="btn"  type="submit">Avançar</button>
    </form>
     </div>
<script src="index.js">

</script>


</body>
</html>
